name: remind
on:
  schedule:
    - cron: "*/30 * * * *"    # 30分ごと。試合開始 約1時間前に通知
  workflow_dispatch:
    inputs:
      test:
        description: "サンプル通知を1通送って受信確認する"
        type: boolean
        default: false
permissions:
  contents: write
concurrency:
  group: remind
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m src.remind
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REMIND_TEST: ${{ inputs.test && '1' || '' }}
      - name: commit notified state
        run: |
          git config user.name "wc-bet-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/notified.json
          if git diff --cached --quiet; then
            echo "no new notifications"
            exit 0
          fi
          git commit -m "remind state $(date -u '+%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break || sleep 5
          done
